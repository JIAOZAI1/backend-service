apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-service
  namespace: default
  labels:
    app: admin-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-service
  template:
    metadata:
      labels:
        app: admin-service
    spec:
      containers:
        - name: admin-service
          image: ghcr.io/jiaozai1/admin-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "dev"
            # MySQL 统一从 config-dev-secret 注入（见 deploy/k8s/base/secret-example.yaml）。
            # MYSQL_* 仅用于拼接下方 ConnectionStrings__MySql，需定义在其之前。
            - name: MYSQL_HOST
              valueFrom:
                secretKeyRef:
                  name: config-dev-secret
                  key: mysql-host
            - name: MYSQL_PORT
              valueFrom:
                secretKeyRef:
                  name: config-dev-secret
                  key: mysql-port
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: config-dev-secret
                  key: mysql-database
            - name: MYSQL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: config-dev-secret
                  key: mysql-username
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: config-dev-secret
                  key: mysql-password
            - name: ConnectionStrings__MySql
              value: "Server=$(MYSQL_HOST);Port=$(MYSQL_PORT);Database=$(MYSQL_DATABASE);User=$(MYSQL_USERNAME);Password=$(MYSQL_PASSWORD);"
            # 审核开户流程集群内直连 sso-service / backend-job-service（Service DNS，不经网关）
            - name: Services__SsoService__BaseUrl
              value: "http://sso-service.default.svc.cluster.local"
            - name: Services__JobService__BaseUrl
              value: "http://backend-job-service.default.svc.cluster.local"
            # 内部服务间调用共享密钥：既用于调用 sso-service/backend-job-service 内部接口时
            # 自动附加为 X-Internal-Token 请求头（见 InternalTokenDelegatingHandler），也用于
            # 校验 backend-job-service 反查本服务 /internal/* 接口时携带的同一个密钥
            # （见 RequireInternalTokenMiddleware）
            - name: Internal__Token
              valueFrom:
                secretKeyRef:
                  name: config-dev-secret
                  key: internal-api-token
            # 数据库实例密码加密密钥（AES-256-GCM，见 packages/db-credential-crypto）：
            # 注册/编辑数据库实例时加密密码后落库，与 backend-job-service 未来解密时共用同一份
            - name: DbInstanceEncryptionKey
              valueFrom:
                secretKeyRef:
                  name: config-dev-secret
                  key: db-instance-encryption-key
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
