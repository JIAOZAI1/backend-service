apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-job-service
  namespace: default
  labels:
    app: backend-job-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-job-service
  template:
    metadata:
      labels:
        app: backend-job-service
    spec:
      containers:
        - name: backend-job-service
          image: ghcr.io/jiaozai1/backend-job-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "dev"
            # MySQL / RabbitMQ 统一从 config-dev-secret 注入（见 deploy/k8s/base/secret-example.yaml）。
            # MYSQL_* 仅用于拼接下方 ConnectionStrings__MySql，需定义在其之前。
            - name: MYSQL_HOST
              valueFrom:
                secretKeyRef:
                  name: config-dev-secret
                  key: mysql-host
            - name: MYSQL_PORT
              valueFrom:
                secretKeyRef:
                  name: config-dev-secret
                  key: mysql-port
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: config-dev-secret
                  key: mysql-database
            - name: MYSQL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: config-dev-secret
                  key: mysql-username
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: config-dev-secret
                  key: mysql-password
            - name: ConnectionStrings__MySql
              value: "Server=$(MYSQL_HOST);Port=$(MYSQL_PORT);Database=$(MYSQL_DATABASE);User=$(MYSQL_USERNAME);Password=$(MYSQL_PASSWORD);"
            # 内置 MySQL 插件（建库/建用户）不再用固定的管理员连接串，改为按 Job 参数里的
            # databaseInstanceId 反查 admin-service 现取解密后的连接信息；同 sso-mark-user-reviewed/
            # admin-activate-tenant 两个开户后续插件，base URL 均走集群内 Service DNS，不经网关
            - name: JOB_PLUGIN_ADMIN_SERVICE_BASE_URL
              value: "http://admin-service.default.svc.cluster.local"
            - name: JOB_PLUGIN_SSO_SERVICE_BASE_URL
              value: "http://sso-service.default.svc.cluster.local"
            - name: RabbitMq__Host
              valueFrom:
                secretKeyRef:
                  name: config-dev-secret
                  key: rabbitmq-host
            - name: RabbitMq__Port
              valueFrom:
                secretKeyRef:
                  name: config-dev-secret
                  key: rabbitmq-port
            - name: RabbitMq__VirtualHost
              valueFrom:
                secretKeyRef:
                  name: config-dev-secret
                  key: rabbitmq-vhost
            - name: RabbitMq__Username
              valueFrom:
                secretKeyRef:
                  name: config-dev-secret
                  key: rabbitmq-username
            - name: RabbitMq__Password
              valueFrom:
                secretKeyRef:
                  name: config-dev-secret
                  key: rabbitmq-password
            # 内部服务间调用共享密钥：既用于校验 admin-service 直连 POST /jobs、/jobs/{jobId}/tasks
            # 的请求，也用于本服务新增插件（mysql-create-database/mysql-create-user/
            # sso-mark-user-reviewed/admin-activate-tenant）反向调用 admin-service/sso-service
            # 内部接口时携带的 X-Internal-Token（见 BackendJobService.Plugins/Internal/InternalServiceClientHelper.cs）
            - name: Internal__Token
              valueFrom:
                secretKeyRef:
                  name: config-dev-secret
                  key: internal-api-token
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
