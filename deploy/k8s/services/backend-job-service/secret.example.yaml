# 模板文件，禁止填写真实密钥并提交到仓库（见规范第 15 章）。
# 部署前复制为 secret.yaml（已加入 .gitignore）并填入真实值，或改用
# kubectl create secret generic / Vault / External Secrets 等方式管理。
apiVersion: v1
kind: Secret
metadata:
  name: backend-job-service-secrets
  namespace: default
type: Opaque
stringData:
  mysql-connection-string: "Server=REPLACE_ME;Port=3306;Database=backend_job_service_db;User=backend_job_service_user;Password=REPLACE_ME;"
  rabbitmq-username: "REPLACE_ME"
  rabbitmq-password: "REPLACE_ME"
