apiVersion: apps/v1
kind: Deployment
metadata:
  name: sso-service
  namespace: default
  labels:
    app: sso-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sso-service
  template:
    metadata:
      labels:
        app: sso-service
    spec:
      containers:
        - name: sso-service
          image: ghcr.io/jiaozai1/sso-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SSO_APP_ENV
              value: "dev"
            # MySQL / Redis 统一从 config-dev-secret 注入（见 deploy/k8s/base/secret-example.yaml）
            - name: MYSQL_HOST
              valueFrom:
                secretKeyRef:
                  name: config-dev-secret
                  key: mysql-host
            - name: MYSQL_PORT
              valueFrom:
                secretKeyRef:
                  name: config-dev-secret
                  key: mysql-port
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: config-dev-secret
                  key: mysql-database
            - name: MYSQL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: config-dev-secret
                  key: mysql-username
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: config-dev-secret
                  key: mysql-password
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: config-dev-secret
                  key: redis-host
            - name: REDIS_PORT
              valueFrom:
                secretKeyRef:
                  name: config-dev-secret
                  key: redis-port
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: config-dev-secret
                  key: redis-password
            # 服务私有密钥仍走各自的 secret
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: sso-service-secrets
                  key: jwt-secret
            # 内部服务间调用共享密钥（校验 admin-service 直连 /internal/users/... 的请求）
            - name: INTERNAL_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: config-dev-secret
                  key: internal-api-token
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
