apiVersion: apps/v1
kind: Deployment
metadata:
  name: sso-service
  namespace: default
  labels:
    app: sso-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sso-service
  template:
    metadata:
      labels:
        app: sso-service
    spec:
      containers:
        - name: sso-service
          image: ghcr.io/jiaozai1/sso-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SSO_APP_ENV
              value: "dev"
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sso-service-secrets
                  key: mysql-password
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sso-service-secrets
                  key: redis-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: sso-service-secrets
                  key: jwt-secret
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
