# 示例模板文件，禁止填写真实密钥并提交到仓库（见规范第 15 章）。
# 使用方式：复制为 secret-<env>.yaml（如 secret-dev.yaml，需加入 .gitignore）
# 并填入真实值，或改用 kubectl create secret generic / Vault /
# External Secrets 等方式管理。
# 占位符格式为 <...>，使用前请全部替换；metadata.name 需符合 K8s 命名
# 规则（小写字母、数字、连字符）。
apiVersion: v1
kind: Secret
metadata:
  name: config-<env>-secret
  namespace: default
type: Opaque
stringData:
  # ---------- MySQL ----------
  mysql-host: "<mysql-host>"
  mysql-port: "3306"
  mysql-database: "<mysql-database>"
  mysql-username: "<mysql-username>"
  mysql-password: "<mysql-password>"

  # ---------- RabbitMQ ----------
  rabbitmq-host: "<rabbitmq-host>"
  rabbitmq-port: "5672"
  rabbitmq-vhost: "/"
  rabbitmq-username: "<rabbitmq-username>"
  rabbitmq-password: "<rabbitmq-password>"

  # ---------- Redis ----------
  redis-host: "<redis-host>"
  redis-port: "6379"
  redis-db: "0"
  redis-password: "<redis-password>"

  # ---------- 内部服务间调用共享密钥 ----------
  # sso-service / backend-job-service / admin-service 三个服务共享同一份，用于
  # RequireInternalToken 系列中间件校验集群内直连调用，弥补仅靠网络可达性作为
  # 信任边界的不足；建议用 openssl rand -base64 32 之类的方式生成，定期轮换。
  internal-api-token: "<internal-api-token>"

  # ---------- 数据库实例密码加密密钥 ----------
  # admin-service 注册数据库实例（见 DatabaseInstancesController）时用它加密密码后
  # 落库，backend-job-service 未来执行作业连接目标实例时用同一份密钥解密，两端共用
  # packages/db-credential-crypto 这份加解密 SDK。必须是 32 字节（AES-256）密钥的
  # base64 编码，用 openssl rand -base64 32 生成，定期轮换（轮换前需要先解密旧数据
  # 再用新密钥重新加密，否则旧密文无法解密）。
  db-instance-encryption-key: "<db-instance-encryption-key>"
