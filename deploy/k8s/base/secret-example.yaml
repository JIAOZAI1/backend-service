# 示例模板文件，禁止填写真实密钥并提交到仓库（见规范第 15 章）。
# 使用方式：复制为 secret-<env>.yaml（如 secret-dev.yaml，需加入 .gitignore）
# 并填入真实值，或改用 kubectl create secret generic / Vault /
# External Secrets 等方式管理。
# 占位符格式为 <...>，使用前请全部替换；metadata.name 需符合 K8s 命名
# 规则（小写字母、数字、连字符）。
apiVersion: v1
kind: Secret
metadata:
  name: config-<env>-secret
  namespace: default
type: Opaque
stringData:
  # ---------- MySQL ----------
  mysql-host: "<mysql-host>"
  mysql-port: "3306"
  mysql-database: "<mysql-database>"
  mysql-username: "<mysql-username>"
  mysql-password: "<mysql-password>"
  # 管理员账号：backend-job-service 内置 MySQL 插件（建库/建用户）使用，
  # 与业务账号分开，需具备 CREATE / CREATE USER / GRANT OPTION 权限
  mysql-admin-username: "<mysql-admin-username>"
  mysql-admin-password: "<mysql-admin-password>"

  # ---------- RabbitMQ ----------
  rabbitmq-host: "<rabbitmq-host>"
  rabbitmq-port: "5672"
  rabbitmq-vhost: "/"
  rabbitmq-username: "<rabbitmq-username>"
  rabbitmq-password: "<rabbitmq-password>"

  # ---------- Redis ----------
  redis-host: "<redis-host>"
  redis-port: "6379"
  redis-db: "0"
  redis-password: "<redis-password>"
