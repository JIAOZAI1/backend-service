app:
  env: dev
  port: 8080

mysql:
  dsn: "${MYSQL_USERNAME}:${MYSQL_PASSWORD}@tcp(${MYSQL_HOST}:${MYSQL_PORT})/${MYSQL_DATABASE}?charset=utf8mb4&parseTime=True&loc=Local"

redis:
  addr: "${REDIS_HOST}:${REDIS_PORT}"
  password: "${REDIS_PASSWORD}"
  db: 0

jwt:
  secret: "${JWT_SECRET}"
  issuer: "sso-service"
  accessTokenTTL: 15m
  refreshTokenTTL: 168h

internal:
  token: "${INTERNAL_API_TOKEN}"
