name: admin-service-ci

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "services/admin-service/**"
  pull_request:
    paths:
      - "services/admin-service/**"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/admin-service

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/admin-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.301"

      - name: Restore
        run: dotnet restore AdminService.slnx

      - name: Check formatting
        run: dotnet format AdminService.slnx --verify-no-changes

      - name: Build
        run: dotnet build AdminService.slnx -c Release --no-restore

      - name: Test
        run: |
          dotnet test tests/AdminService.UnitTests -c Release --no-build
          dotnet test tests/AdminService.IntegrationTests -c Release --no-build

  docker-build-push:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: services/admin-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
